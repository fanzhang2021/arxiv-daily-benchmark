# ============================================
# ArXiv Daily Digest 配置文件（Benchmark专用版）
# ============================================

search:
  categories:
    - cs.SE
    - cs.AI

  keywords:
    - "code"
    - "program"
    - "software"
    - "debugging"
    - "hpc"
    - "parallel"
    - "parallelization"
    - "openmp"

  keyword_mode: "filter"

  filter_exempt_categories:
    - cs.SE          # cs.SE 论文跳过关键词检查，直接进入 LLM 判定

  max_papers: 15
  days_back: 4
  timezone: "Asia/Shanghai"

llm:
  model: "deepseek-chat"
  language: "中文"
  base_url: "https://api.deepseek.com/v1"

email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  subject_prefix: "📚 每日benchmark论文精选"